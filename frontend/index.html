<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麟雫雫的工具箱</title>

    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/settings.css">
    <link rel="stylesheet" href="./css/todo.css">
    <link rel="stylesheet" href="./css/launcher.css">
    <link rel="stylesheet" href="./css/music.css">
    <link rel="stylesheet" href="./css/widgets.css">
    
</head>
<body>
    <video id="bg-video" autoplay loop muted><source src="/data/wallpaper-dynamic.mp4" type="video/mp4"></video>

    <div id="top-controls">
        <button id="settings-btn" class="control-btn">⚙️</button>
        <button id="wallpaper-toggle" class="control-btn">静态壁纸</button>
        <button id="app-menu-btn" class="control-btn" title="应用菜单">应用</button>
        <button id="log-btn" class="control-btn" title="查看运行日志">日志</button>
    </div>

    <div id="time-widget">
        <div id="clock">00:00:00</div>
        <div id="date-display"></div> 
    </div>

    <div id="music-widget" class="glass-widget">
        <div class="music-info">
            <div id="music-title" title="将音乐放入 data/music 目录">🎵 暂无音乐</div>
            <div id="music-time">00:00 / 00:00</div>
        </div>
        <div class="music-progress-bar" id="music-progress-container">
            <div id="music-progress"></div>
        </div>
        <div class="music-controls">
            <button id="music-prev" class="icon-btn" title="上一首">⏮</button>
            <button id="music-play" class="icon-btn" title="播放/暂停" style="font-size: 1.5rem;">▶️</button>
            <button id="music-next" class="icon-btn" title="下一首">⏭</button>
            <div class="volume-container">
                <button id="volume-icon" class="icon-btn" title="静音">🔊</button>
                <input type="range" id="music-volume-slider" min="0" max="0.3" step="0.01" value="0.3">
            </div>
            <button id="music-list-btn" class="icon-btn" title="播放列表">📜</button>
        </div>
        <div id="music-list-panel" class="glass-widget">
            <ul id="music-list" style="list-style: none; padding: 0; margin: 0;"></ul>
        </div>
        <audio id="audio-player" style="display: none;"></audio>
    </div>

    <div id="todo-panel" class="glass-widget">
        <div id="todo-icon" title="拖拽移动，点击展开">📝</div>
        <div id="todo-content">
            <div id="todo-header" title="拖拽移动，点击空白处最小化">
                <div style="font-size: 1.1rem; pointer-events: none; font-weight: bold;">📝 ToDo</div>
                <div style="display: flex; gap: 5px;">
                    <button id="todo-add-btn" class="icon-btn">➕</button>
                    <button id="todo-edit-mode-btn" class="icon-btn">⚙️</button>
                </div>
            </div>
            <div id="todo-tabs">
                <button class="tab-btn active" data-tab="pending">待办</button>
                <button class="tab-btn" data-tab="completed">已完成</button>
            </div>
            <ul id="todo-list"></ul>
        </div>
    </div>

    <div id="todo-modal" class="glass-modal">
        <h2 id="todo-modal-title">新增待办</h2>
        <input type="text" id="todo-modal-input" class="modal-input" placeholder="输入任务内容...">
        <label style="font-size: 0.9rem; margin-bottom: 5px; display: block;">截止日期 (选填)</label>
        <input type="date" id="todo-modal-date" class="modal-input">
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button id="todo-modal-cancel" class="close-btn" style="margin-top: 0;">取消</button>
            <button id="todo-modal-save" class="control-btn primary" style="flex: 1; margin-top: 0; border:none; padding: 10px;">保存</button>
        </div>
    </div>

    <div id="settings-modal" class="glass-modal">
        <div class="settings-sidebar">
            <h2>配置中心</h2>
            <div id="settings-tabs-container"></div>
        </div>
        <div class="settings-content-area">
            <button id="close-settings" class="close-settings-btn">×</button>
            <div id="settings-form-container"></div>
        </div>
    </div>

    <div id="app-menu-modal" class="glass-modal">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 15px;">
            <div style="display: flex; align-items: center; gap: 20px;">
                <h2 style="margin: 0; border: none; padding: 0;">🚀 启动器</h2>
                <div id="app-tabs" style="display: flex; gap: 10px; padding-top: 5px;">
                    <button class="tab-btn active" data-app-tab="apps">本地应用</button>
                    <button class="tab-btn" data-app-tab="plugins">扩展插件</button>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="add-app-btn" class="control-btn primary" style="padding: 4px 12px; margin: 0;">➕ 添加应用</button>
                <button id="close-app-menu" class="close-settings-btn" style="position: static; padding: 0; line-height: 1;">×</button>
            </div>
        </div>
        <div id="app-grid" class="app-grid"></div>
    </div>

    <div id="log-modal" class="glass-modal">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 10px;">
            <h2 style="margin: 0; border: none; padding: 0;">📜 后台运行日志</h2>
            <button id="close-log-btn" class="close-settings-btn" style="position: static; padding: 0;">×</button>
        </div>
        <div id="log-content" style="height: 350px; overflow-y: auto; background: rgba(0,0,0,0.6); border-radius: 8px; padding: 12px; font-family: Consolas, monospace; font-size: 13px; color: #a3be8c; white-space: pre-wrap; word-wrap: break-word;"></div>
    </div>

    <div id="plugin-modal" class="glass-modal" style="width: 850px; height: 600px; padding: 0; display: flex; flex-direction: column; overflow: hidden; resize: both; position: absolute; transition: opacity 0.3s ease, transform 0.3s ease;">
        
        <div id="plugin-modal-header" style="padding: 15px 20px; background: rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: grab;">
            <h3 id="plugin-modal-title" style="margin: 0; font-size: 1.1rem; border: none; padding: 0; color: white;">加载中...</h3>
            <button id="close-plugin-btn" class="close-settings-btn" style="position: static; padding: 0; line-height: 1; cursor: pointer;">×</button>
        </div>

        <div id="plugin-content-container" style="flex: 1; width: 100%; position: relative; overflow-y: auto; overflow-x: hidden; padding: 20px;"></div>
        
    </div>

    <script src="./lib/pixi.min.js"></script>
    <script src="./lib/live2d.min.js"></script>
    <script src="./lib/live2dcubismcore.min.js"></script>
    <script src="./lib/index.min.js"></script>

    <script src="./js/utils.js"></script>
    <script src="./js/state.js"></script>
    <script src="./js/wallpaper.js"></script>
    <script src="./js/widgets.js"></script>
    <script src="./js/settings.js"></script>
    <script src="./js/todo.js"></script>
    <script src="./js/launcher.js"></script>
    <script src="./js/init.js"></script>
    <script src="./js/music.js"></script> 

</body>
</html>
